<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GOJIN.NET | Internet Cepat & Stabil</title>
    <!-- Redirect otomatis ke landing.html -->
    <meta http-equiv="refresh" content="0; url=landing.html">
    <!-- SEO dasar -->
    <meta name="description" content="GOJIN.NET - Penyedia internet fiber optik cepat, stabil, dan terjangkau untuk rumah & bisnis.">
    <meta name="keywords" content="internet cepat, fiber optik, ISP, GOJIN.NET, internet rumah, internet bisnis">
    <!-- Favicon opsional -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
    <style>
        /* Tampilan redirect yang mulus jika pengguna melihat halaman ini */
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #f5f7fc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            color: #1e293b;
        }
        .redirect-box {
            background: white;
            padding: 40px 30px;
            border-radius: 32px;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
        }
        .redirect-box .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #e2e8f0;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .redirect-box h2 {
            color: #0f172a;
            margin-bottom: 8px;
        }
        .redirect-box p {
            color: #475569;
            margin-bottom: 16px;
        }
        .redirect-box a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }
        .redirect-box a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="redirect-box">
        <div class="loader"></div>
        <h2>GOJIN.NET</h2>
        <p>Mengarahkan ke halaman utama...</p>
        <p style="font-size:0.85rem;">Jika tidak otomatis, klik <a href="landing.html">di sini</a></p>
    </div>
    <!-- Fallback redirect via JavaScript jika meta refresh tidak bekerja -->
    <script>
        // Redirect otomatis menggunakan JavaScript sebagai fallback
        window.location.replace('landing.html');
    </script>
</body>
</html>
